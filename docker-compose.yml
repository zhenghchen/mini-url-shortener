services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: mini-url-dynamodb
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory"]

  app:
    image: mini-url-shortener:latest
    container_name: mini-url-app
    ports:
      - "8080:8080"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb:8000
    depends_on:
      - dynamodb

